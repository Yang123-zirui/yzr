name: Build & Deploy Blog to GitHub Pages
on:
  push:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库全部源码
        uses: actions/checkout@v4
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装MkDocs静态网站工具
        run: pip install mkdocs mkdocs-material
      - name: 将Markdown文章渲染为网页
        run: mkdocs build
      - name: 上传生成好的网页文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - name: 自动部署到GitHub Pages
        uses: actions/deploy-pages@v4
